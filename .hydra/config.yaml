env:
  name: metadrive_base
  env_id: MetaDriveEnv
  config:
    use_render: false
    horizon: 50
    traffic_density: 0.0
    start_seed: 5
    num_scenarios: 1
    random_spawn_lane_index: false
    discrete_action: false
    log_level: 50
  observation:
    type: lidar_state
  action:
    type: continuous
    low: -1.0
    high: 1.0
    shape:
    - 2
  policy_mode:
    enabled: false
    agent_policy: env_input_policy
    action_check: true
    low: -1.0
    high: 1.0
agent:
  name: td3
  sb3:
    algorithm: TD3
    policy: MlpPolicy
    verbose: 1
    learning_starts: 10000
    batch_size: 256
    buffer_size: 100000
    train_freq: 1
    gradient_steps: 1
    learning_rate: 0.001
    gamma: 0.99
    tau: 0.005
planner:
  name: td3_mlp
  policy_kwargs:
    net_arch:
    - 256
    - 256
preprocessor:
  name: identity
  cast_to_float32: true
  flatten_if_needed: false
adapter:
  name: direct_action
  clip: true
  low: -1.0
  high: 1.0
  validate_shape: true
  expected_shape:
  - 2
reward:
  name: hybrid_rulebook
  mode: hybrid
  attach_info: true
  rulebook: baseline
  a: 2.01
  c: 30.0
  lambda_env: 1.0
  lambda_rule: 0.2
  include_violation_vector: true
  scales:
    vru_collision_energy: 50000.0
    vehicle_collision_energy: 150000.0
    drivable_area: 2.0
    wrong_way: 0.2
    speed_limit: 5.0
    lane_centering: 1.5
    goal_progress: 25.0
    longitudinal_accel: 3.0
    lateral_accel: 3.0
rulebook:
  name: baseline_v3
  mode: ex_post
  rules:
  - name: vru_collision_energy
    priority: 0
  - name: vehicle_collision_energy
    priority: 1
  - name: drivable_area
    priority: 2
  - name: wrong_way
    priority: 3
  - name: speed_limit
    priority: 4
  - name: lane_centering
    priority: 5
  - name: goal_progress
    priority: 6
  - name: longitudinal_accel
    priority: 7
  - name: lateral_accel
    priority: 8
experiment:
  name: test_rulebook_hybrid_calibration
  total_timesteps: 8000
  log_interval: 400
  eval_interval: 4000
  eval_episodes: 1
  eval_deterministic: true
  save_interval: 4000
  curriculum:
    enabled: false
seed: 42
device: auto
run_name: ${experiment.name}_${now:%Y%m%d_%H%M%S}
checkpoint_path: checkpoints/test_rulebook_hybrid_calibration_td3.zip
paths:
  logs_dir: logs
  checkpoints_dir: checkpoints
