name: PLN_${hydra:runtime.choices.planner}_REW_${hydra:runtime.choices.reward}_CUR_${hydra:runtime.choices.curriculum}
defaults:
  - env: metadrive          # 'metadrive'
  - experiment: default

  - preprocessor: identity  # 'identity'
  - planner: sb3_td3        # 'sb3_td3' | ...
  - adapter: identity       # 'identity'

  - reward: scalar_native   # scalar_native | scalar_default | rulebook | scalar_rulebook | hybrid | lexicographic
  - curriculum: disabled    # 'disabled' | 'stages'
  
  - video: default
  - override hydra/job_logging: disabled

  - _self_

seed: 42
device: auto

scenario_splits:
  # MetaDrive treats reset(seed=...) as a scenario index. Keep these pools disjoint:
  # train uses env.config.start_seed, validation uses validation_offset, final/test uses test_offset.
  # The stride must exceed the largest per-stage start_seed + num_scenarios window.
  stride: 1000000
  validation_offset: 1000000
  test_offset: 2000000

analysis:
  include_in_comparison: true
  experiment_group: EXP_${experiment.name}_CUR_${curriculum.name}_REW_${reward.name}

# Results and logging
paths:
  run_dir: outputs/${analysis.experiment_group}/${planner.name}/seed_${seed}/${now:%Y%m%d_%H%M%S}
  logs_dir: ${paths.run_dir}/logs
  checkpoints_dir: ${paths.run_dir}/checkpoints    # Directory to save model checkpoints during training.
  videos_dir: ${paths.run_dir}/videos
  csv_dir: ${paths.run_dir}/csv
  artifacts_dir: ${paths.run_dir}/artifacts

checkpoint_path: ${paths.checkpoints_dir}/final.zip  # Path to save the final model checkpoint after training.

checkpoint:
  save_latest_each_chunk: true
  save_final: true
  save_best_lexicographic: true
  save_best_lexicographic_rulebook: true
  save_best_thresholded_lexicographic_rulebook: true
  save_periodic: true
  periodic_interval_steps: 250000
  keep_last_periodic: 4
  save_rng_state: true
  resume:
    enabled: false
    run_dir: null            # if null, resume from current run_dir
    checkpoint_name: latest  # latest | final | <custom-stem-under-checkpoints>
    restore_rng_state: true

# Hydra stuff
hydra:
  run:
    dir: ${paths.run_dir}
  output_subdir: hydra
