name: metadrive
env_id: MetaDriveEnv

# Main environment configuration
config:
  use_render: false
  horizon: 500
  map: 5
  traffic_density: 0.1
  start_seed: 10000
  num_scenarios: 5000
  random_spawn_lane_index: true
  random_lane_width: true
  random_lane_num: true
  random_agent_model: true
  log_level: 50

# Default observation type:
# LidarStateObservation
# More on https://metadrive.readthedocs.io/en/latest/observation.html#lidarstateobservation

# Action space is continuous by default:
# Box with shape (2,) and values in [-1, 1] for steering and throttle
# More on https://metadrive-simulator.readthedocs.io/en/latest/action.html

###### Additional configuration for the env-side adapter ######
# For converting agent actions to env actions
# More on https://metadrive-simulator.readthedocs.io/en/latest/action.html#policy
# [Note: not yet revised, keep on enabled:false]
policy_mode:
  enabled: false
  agent_policy: env_input_policy
  action_check: true
  low: -1.0
  high: 1.0
