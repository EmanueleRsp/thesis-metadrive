name: metadrive_base
env_id: MetaDriveEnv

config:
  use_render: false
  horizon: 500
  traffic_density: 0.0
  start_seed: 5
  num_scenarios: 1
  random_spawn_lane_index: false
  discrete_action: false
  log_level: 50

observation:
  type: lidar_state

action:
  type: continuous
  low: -1.0
  high: 1.0
  shape: [2]

policy_mode:
  enabled: false
  agent_policy: env_input_policy
  action_check: true
  low: -1.0
  high: 1.0
