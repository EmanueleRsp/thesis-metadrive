name: test_curriculum_auto_calibration
total_timesteps: 360
log_interval: 120
eval_interval: 120
eval_episodes: 1
eval_deterministic: true
save_interval: 360
curriculum:
  enabled: true
  mode: auto
  fixed_stage: stage1
  stages:
    - name: stage1
      env:
        map: "S"
        traffic_density: 0.0
        start_seed: 5
        num_scenarios: 1
        random_lane_width: false
        random_lane_num: false
        random_agent_model: false
    - name: stage2
      env:
        map: 3
        traffic_density: 0.0
        start_seed: 1000
        num_scenarios: 16
        random_lane_width: true
        random_lane_num: true
        random_agent_model: false
  promotion:
    consecutive_evals: 2
    warmup_evals: 1
    min_stage_steps: 240
    no_demotion: true
    gates:
      safety:
        collision_rate_max: 0.2
        top_rule_violation_rate_max: 0.2
        out_of_road_rate_max: 0.3
      task:
        success_rate_min: 0.2
        route_completion_min: 0.4
      quality:
        mean_reward_min: 0.0
