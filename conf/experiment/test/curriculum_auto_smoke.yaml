name: test_curriculum_auto_smoke
total_timesteps: 600
log_interval: 200
eval_interval: 200
eval_episodes: 1
eval_deterministic: true
save_interval: 600
curriculum:
  enabled: true
  mode: auto
  fixed_stage: stage1
  stages:
    - name: stage1
      env:
        map: "S"
        traffic_density: 0.0
        start_seed: 5
        num_scenarios: 1
        random_lane_width: false
        random_lane_num: false
        random_agent_model: false
    - name: stage2
      env:
        map: "C"
        traffic_density: 0.0
        start_seed: 7
        num_scenarios: 1
        random_lane_width: false
        random_lane_num: false
        random_agent_model: false
  promotion:
    consecutive_evals: 1
    warmup_evals: 0
    min_stage_steps: 200
    no_demotion: true
    gates:
      safety:
        collision_rate_max: 1.0
        top_rule_violation_rate_max: 1.0
        out_of_road_rate_max: 1.0
      task:
        success_rate_min: 0.0
        route_completion_min: 0.0
      quality:
        mean_reward_min: -1000000.0
