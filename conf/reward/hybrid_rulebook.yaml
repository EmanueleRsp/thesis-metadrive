name: hybrid_rulebook
mode: hybrid
attach_info: true
rulebook: baseline_v3

a: 2.01
c: 30.0
lambda_env: 1.0
lambda_rule: 0.2

# Optional debug payload: v_i = max(0, -m_i)
include_violation_vector: false

# Per-rule scales used in rho_i = tanh(m_i / s_i)
scales:
  vru_collision_energy: 50000.0
  vehicle_collision_energy: 150000.0
  drivable_area: 2.0
  wrong_way: 0.2
  speed_limit: 5.0
  lane_centering: 1.5
  goal_progress: 25.0
  longitudinal_accel: 3.0
  lateral_accel: 3.0
