env:
  name: metadrive_base
  env_id: MetaDriveEnv
  config:
    use_render: false
    horizon: 500
    traffic_density: 0.0
    start_seed: 5
    num_scenarios: 1
    random_spawn_lane_index: false
    discrete_action: false
    log_level: 50
  observation:
    type: lidar_state
  action:
    type: continuous
    low: -1.0
    high: 1.0
    shape:
    - 2
agent:
  name: td3
  sb3:
    algorithm: TD3
    policy: MlpPolicy
    verbose: 1
    learning_starts: 10000
    batch_size: 256
    buffer_size: 100000
    train_freq: 1
    gradient_steps: 1
    learning_rate: 0.001
    gamma: 0.99
    tau: 0.005
planner:
  name: td3_mlp
  policy_kwargs:
    net_arch:
    - 256
    - 256
preprocessor:
  name: identity
  cast_to_float32: true
  flatten_if_needed: false
adapter:
  name: direct_action
  clip: true
  low: -1.0
  high: 1.0
  validate_shape: true
  expected_shape:
  - 2
reward:
  name: scalar_default
  mode: scalar
  attach_info: false
experiment:
  name: baseline
  total_timesteps: 300000
  eval_interval: 25000
  eval_episodes: 10
  eval_deterministic: false
  save_interval: 50000
  curriculum:
    enabled: false
seed: 42
device: cuda
run_name: ${experiment.name}_${now:%Y%m%d_%H%M%S}
checkpoint_path: null
paths:
  logs_dir: logs
  checkpoints_dir: checkpoints
